<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ColorMate</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111113;
    --bg2: #1a1a1c;
    --bg3: #222224;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #444;
    --accent: #4da3ff;
    --accent2: #1a6fd4;
    --success: #1D9E75;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 16px 12px;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--muted); font-weight: 600; }

  /* ── Tab bar ── */
  .tabs {
    display: flex;
    gap: 0;
    margin: 14px 16px 16px;
    background: var(--bg2);
    border-radius: 99px;
    padding: 3px;
    border: 0.5px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 9px 0;
    border-radius: 99px;
    border: none;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .tab svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .tab.active {
    background: var(--bg);
    color: var(--text);
    font-weight: 500;
    box-shadow: 0 0 0 0.5px var(--border2);
  }

  /* ── Panels ── */
  .panel { display: none; padding: 0 0 100px; }
  .panel.active { display: block; }

  /* ── Section label ── */
  .sec-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 0 16px;
    margin-bottom: 8px;
  }

  /* ── Swatch grid ── */
  .swatches {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 0 16px 16px;
  }
  .swatch {
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .swatch:active { transform: scale(0.91); }
  .swatch.selected { border-color: #fff; transform: scale(1.06); }
  .swatch-label {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-size: 8px;
    font-weight: 500;
  }

  /* ── Hex input row ── */
  .hex-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 16px 16px;
  }
  .hex-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .hex-input {
    flex: 1;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    letter-spacing: 1px;
    text-transform: uppercase;
    outline: none;
  }
  .hex-input:focus { border-color: var(--accent); }
  .apply-btn {
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .apply-btn:active { color: var(--text); }

  /* ── Context chips ── */
  .ctx-row {
    display: flex;
    gap: 0;
    margin: 0 16px 16px;
    background: var(--bg2);
    border-radius: 99px;
    padding: 3px;
    border: 0.5px solid var(--border);
  }
  .ctx-btn {
    flex: 1;
    padding: 7px 0;
    border-radius: 99px;
    border: none;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .ctx-btn.active { background: var(--bg3); color: var(--text); }

  /* ── Color strip ── */
  .strip {
    display: flex;
    margin: 0 16px 14px;
    border-radius: var(--radius);
    overflow: hidden;
    height: 56px;
    border: 0.5px solid var(--border);
  }
  .slice {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6px;
    transition: flex 0.25s;
    cursor: default;
  }
  .slice:hover { flex: 1.9; }
  .slice-lbl { font-size: 8px; font-family: 'DM Mono', monospace; font-weight: 500; }

  /* ── Palette cards ── */
  .cards { display: flex; flex-direction: column; gap: 6px; margin: 0 16px; }
  .card {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 13px;
    background: var(--bg2);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
  }
  .dot {
    width: 42px;
    height: 42px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dot-lbl { font-size: 8px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .c-info { flex: 1; min-width: 0; }
  .c-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .c-hex { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .c-pct { font-size: 10px; color: var(--muted2); margin-left: auto; padding-right: 6px; }
  .copy-btn {
    padding: 5px 11px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s;
  }
  .copy-btn.ok { color: var(--success); border-color: var(--success); }

  /* ── Divider ── */
  .divider { height: 0.5px; background: var(--border); margin: 0 16px 16px; }

  /* ── Shuffle btn ── */
  .shuffle-btn {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 13px;
    border-radius: 99px;
    border: 0.5px solid var(--border2);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .shuffle-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.4s; }
  .shuffle-btn.spinning svg { transform: rotate(180deg); }
  .shuffle-btn:active { background: var(--bg2); }

  /* ── Bottom action row ── */
  .bottom-row {
    display: flex;
    gap: 8px;
    margin: 14px 16px 0;
  }
  .bottom-btn {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }
  .bottom-btn:active { background: var(--bg2); }

  /* ── Upload zone (Photo tab) ── */
  .upload-zone {
    margin: 0 16px 16px;
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s;
  }
  .upload-zone.has-img { padding: 0; border: 0.5px solid var(--border); overflow: hidden; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone svg { width: 32px; height: 32px; stroke: var(--muted2); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 10px; }
  .upload-main { font-size: 13px; color: #aaa; line-height: 1.5; }
  .upload-hint { font-size: 10px; color: var(--muted2); margin-top: 6px; }
  .preview-img { width: 100%; height: 150px; object-fit: cover; display: block; }

  /* ── Loading bar ── */
  .loading-bar { height: 3px; background: var(--bg2); margin: 0 16px 16px; border-radius: 99px; overflow: hidden; display: none; }
  .loading-fill { height: 100%; background: var(--accent); border-radius: 99px; width: 0%; transition: width 0.05s linear; }

  /* ── Idle state ── */
  .idle-state { text-align: center; padding: 32px 16px; }
  .idle-state svg { width: 28px; height: 28px; stroke: var(--muted2); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 12px; }
  .idle-txt { font-size: 12px; color: var(--muted); line-height: 1.7; }

  /* ── Main TG button ── */
  .tg-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 14px 16px 0;
    width: calc(100% - 32px);
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .tg-btn:active { opacity: 0.8; }
  .tg-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Change photo btn ── */
  .change-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 0 16px 16px;
    width: calc(100% - 32px);
    padding: 9px;
    background: transparent;
    color: var(--muted);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }
  .change-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Color<span>Mate</span></div>
  <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleSwatches()">
    <svg viewBox="0 0 24 24"><path d="M16 3h5v5M4 20l17-17M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
    Shuffle
  </button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('palette',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>
    Palette
  </button>
  <button class="tab" onclick="switchTab('photo',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    Photo Extract
  </button>
</div>

<!-- ═══ PALETTE PANEL ═══ -->
<div class="panel active" id="panel-palette">
  <div class="sec-label">Pick a base color</div>
  <div class="swatches" id="swatchGrid"></div>

  <div class="hex-row">
    <label>HEX</label>
    <input class="hex-input" type="text" id="hexInput" maxlength="7" placeholder="#1A1A1A" />
    <button class="apply-btn" onclick="applyHex()">Apply</button>
  </div>

  <div class="sec-label">Context</div>
  <div class="ctx-row" id="ctxRow">
    <button class="ctx-btn active" onclick="setCtx(this,'outfit')">Outfit</button>
    <button class="ctx-btn" onclick="setCtx(this,'interior')">Interior</button>
    <button class="ctx-btn" onclick="setCtx(this,'design')">Design</button>
  </div>

  <div class="divider"></div>

  <div class="sec-label">Palette</div>
  <div class="strip" id="strip"></div>
  <div class="cards" id="cards"></div>

  <div class="bottom-row">
    <button class="bottom-btn" onclick="nextVariant()">↻ Another variant</button>
    <button class="bottom-btn" onclick="copyAllPalette()">Copy all HEX</button>
  </div>
</div>

<!-- ═══ PHOTO PANEL ═══ -->
<div class="panel" id="panel-photo">
  <div class="sec-label">Upload photo</div>
  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/*" id="fileInput" onchange="handleFile(event)" />
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/><path d="M12 3v4M10 5l2-2 2 2" style="stroke-dasharray:none"/></svg>
    <div class="upload-main">Drop photo here<br>or tap to upload</div>
    <div class="upload-hint">JPG · PNG · WEBP</div>
  </div>

  <div class="loading-bar" id="loadingBar">
    <div class="loading-fill" id="loadingFill"></div>
  </div>

  <div id="photoResult">
    <div class="idle-state">
      <svg viewBox="0 0 24 24"><path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
      <div class="idle-txt">Upload any photo to extract<br>its dominant color palette</div>
    </div>
  </div>
</div>

<script>
/* ─── COLOR UTILITIES ─── */
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}return[h*360,s*100,l*100];}
function hslToHex(h,s,l){h=((h%360)+360)%360;s=Math.max(0,Math.min(100,s))/100;l=Math.max(5,Math.min(94,l))/100;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let r=0,g=0,b=0;if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}return'#'+[r+m,g+m,b+m].map(v=>Math.round(v*255).toString(16).padStart(2,'0')).join('');}
function lum(hex){const[r,g,b]=hexToRgb(hex);return(r*299+g*587+b*114)/1000;}
function colorName(hex){const[r,g,b]=hexToRgb(hex);const[h,s,l]=rgbToHsl(r,g,b);if(l<10)return'Near Black';if(l>92)return'Near White';if(s<10)return l<35?'Dark Gray':l<65?'Gray':'Light Gray';if(h<15||h>345)return l<40?'Deep Red':'Blush';if(h<30)return s>55?'Orange':'Rust';if(h<55)return s>50?'Amber':'Sand';if(h<80)return s>50?'Yellow':'Olive';if(h<150)return l<35?'Dark Green':s>50?'Green':'Sage';if(h<195)return l<40?'Deep Teal':'Teal';if(h<250)return l<38?'Navy':l<62?'Blue':'Sky Blue';if(h<285)return l<45?'Indigo':'Violet';if(h<320)return l<45?'Purple':'Lavender';return l<45?'Plum':'Mauve';}

/* ─── PALETTE STATE ─── */
const DEFAULT_SWATCHES=[
  {hex:'#1A1A1A',name:'Black'},{hex:'#F5F5F0',name:'White'},
  {hex:'#2C4A7C',name:'Navy'},{hex:'#8B2635',name:'Burgundy'},
  {hex:'#4A7C59',name:'Forest'},{hex:'#C8A96E',name:'Camel'},
  {hex:'#D65A3A',name:'Terracotta'},{hex:'#7B5EA7',name:'Violet'},
];
let swatches=[...DEFAULT_SWATCHES];
let baseHex='#1A1A1A';
let ctx='outfit';
let variant=0;

function generateSwatches(){
  const result=[];
  result.push({hex:hslToHex(Math.random()*360,5,10+Math.random()*12),name:''});
  result.push({hex:hslToHex(Math.random()*360,8,84+Math.random()*10),name:''});
  const baseHue=Math.random()*360;
  for(let i=0;i<6;i++){const h=(baseHue+i*60+(Math.random()-.5)*25+360)%360;const s=30+Math.random()*55,l=22+Math.random()*50;result.push({hex:hslToHex(h,s,l),name:''});}
  result.forEach(sw=>sw.name=colorName(sw.hex));
  return result;
}

function shuffleSwatches(){
  const btn=document.getElementById('shuffleBtn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'),420);
  swatches=generateSwatches();
  baseHex=swatches[2].hex;
  variant=0;
  buildSwatches();
  renderPalette();
  document.getElementById('hexInput').value=baseHex.toUpperCase();
}

function getPalette(hex,ctx,v){
  const[r,g,b]=hexToRgb(hex);let[h,s,l]=rgbToHsl(r,g,b);
  const ach=s<8;if(ach)s=55;
  const bL=Math.max(22,Math.min(75,ach?(l<30?18:82):l));
  const sc={outfit:['complementary','analogous','triad'],interior:['analogous','complementary','triad'],design:['triad','complementary','analogous']};
  const mode=(sc[ctx]||sc.outfit)[v%3];
  const n=Math.floor(v/3)*9;
  if(mode==='complementary')return[{h:h+150+n,s,l:bL+8},{h:h+180+n,s:s+10,l:bL},{h:h+210+n,s:s-5,l:bL-10}].map(mk);
  if(mode==='analogous'){const sp=28+n;return[{h:h-sp,s:s+5,l:bL+10},{h:h+sp,s:s+5,l:bL},{h:h+sp*1.9,s:s-8,l:bL-12}].map(mk);}
  return[{h:h+120+n,s,l:bL},{h:h+240+n,s:s+8,l:bL+8},{h:h+60+n,s:s-10,l:bL-10}].map(mk);
}
function mk({h,s,l}){const hex=hslToHex(h,s,l);return{hex,name:colorName(hex)};}

function renderPalette(){
  const palette=getPalette(baseHex,ctx,variant);
  const all=[{hex:baseHex,name:colorName(baseHex),role:'Base'},...palette.map((c,i)=>({...c,role:`Match ${i+1}`}))];
  document.getElementById('strip').innerHTML=all.map(c=>{
    const br=lum(c.hex)>140?'rgba(0,0,0,0.45)':'rgba(255,255,255,0.55)';
    return`<div class="slice" style="background:${c.hex}"><span class="slice-lbl" style="color:${br}">${c.role}</span></div>`;
  }).join('');
  document.getElementById('cards').innerHTML=all.map((c,i)=>{
    const br=lum(c.hex)>140?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.65)';
    return`<div class="card">
      <div class="dot" style="background:${c.hex}"><span class="dot-lbl" style="color:${br}">${c.role}</span></div>
      <div class="c-info"><div class="c-name">${c.name}</div><div class="c-hex">${c.hex.toUpperCase()}</div></div>
      <button class="copy-btn" id="pcp${i}" onclick="copyOne('pcp${i}','${c.hex.toUpperCase()}')">Copy</button>
    </div>`;
  }).join('');
}

function buildSwatches(){
  const grid=document.getElementById('swatchGrid');
  grid.innerHTML='';
  swatches.forEach(sw=>{
    const el=document.createElement('div');
    el.className='swatch'+(sw.hex.toLowerCase()===baseHex.toLowerCase()?' selected':'');
    el.style.background=sw.hex;
    const br=lum(sw.hex)>140?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.75)';
    el.innerHTML=`<span class="swatch-label" style="color:${br}">${sw.name}</span>`;
    el.onclick=()=>{baseHex=sw.hex;variant=0;buildSwatches();renderPalette();document.getElementById('hexInput').value=sw.hex.toUpperCase();};
    grid.appendChild(el);
  });
}

function setCtx(btn,c){
  document.querySelectorAll('.ctx-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');ctx=c;variant=0;renderPalette();
}
function applyHex(){
  let v=document.getElementById('hexInput').value.trim();
  if(!v.startsWith('#'))v='#'+v;
  if(!/^#[0-9A-Fa-f]{6}$/.test(v)){
    const inp=document.getElementById('hexInput');
    inp.style.borderColor='#e24b4a';
    setTimeout(()=>inp.style.borderColor='',1000);
    return;
  }
  baseHex=v;variant=0;
  const exists=swatches.some(s=>s.hex.toLowerCase()===v.toLowerCase());
  if(!exists){
    swatches[0]={hex:v,name:colorName(v)};
  }
  buildSwatches();
  renderPalette();
  const btn=document.querySelector('.apply-btn');
  btn.textContent='✓';btn.style.color='#1D9E75';btn.style.borderColor='#1D9E75';
  setTimeout(()=>{btn.textContent='Apply';btn.style.color='';btn.style.borderColor='';},1200);
}
function nextVariant(){variant++;renderPalette();}
function copyAllPalette(){
  const palette=getPalette(baseHex,ctx,variant);
  const all=[baseHex,...palette.map(c=>c.hex)].map(h=>h.toUpperCase()).join(', ');
  navigator.clipboard.writeText(all).catch(()=>{});
  const btns=document.querySelectorAll('#panel-palette .bottom-btn');
  const btn=btns[1];btn.textContent='✓ Copied';
  setTimeout(()=>btn.textContent='Copy all HEX',1500);
}

/* ─── PHOTO EXTRACTION ─── */
function extractColors(img,count=5){
  const canvas=document.createElement('canvas');
  const size=80;canvas.width=size;canvas.height=size;
  const c=canvas.getContext('2d');c.drawImage(img,0,0,size,size);
  const data=c.getImageData(0,0,size,size).data;
  const buckets={};
  for(let i=0;i<data.length;i+=4){
    if(data[i+3]<128)continue;
    const key=`${Math.round(data[i]/32)*32},${Math.round(data[i+1]/32)*32},${Math.round(data[i+2]/32)*32}`;
    buckets[key]=(buckets[key]||0)+1;
  }
  const sorted=Object.entries(buckets).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,e)=>s+e[1],0);
  const results=[];const used=[];
  for(const[key,cnt]of sorted){
    const[r,g,b]=key.split(',').map(Number);
    const hex='#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
    const tooClose=used.some(u=>{const[ur,ug,ub]=hexToRgb(u);return Math.abs(r-ur)+Math.abs(g-ug)+Math.abs(b-ub)<60;});
    if(!tooClose){results.push({hex,pct:Math.round(cnt/total*100)});used.push(hex);}
    if(results.length>=count)break;
  }
  return results;
}

function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  const zone=document.getElementById('uploadZone');
  zone.classList.add('has-img');
  zone.innerHTML=`<input type="file" accept="image/*" id="fileInput" onchange="handleFile(event)" /><img src="${url}" class="preview-img" id="prevImg" />`;

  const lb=document.getElementById('loadingBar');
  const lf=document.getElementById('loadingFill');
  lb.style.display='block';lf.style.width='0%';
  let w=0;const tick=setInterval(()=>{w=Math.min(w+4,90);lf.style.width=w+'%';},40);

  document.getElementById('photoResult').innerHTML='';

  const img=new Image();
  img.onload=()=>{
    const colors=extractColors(img);
    clearInterval(tick);lf.style.width='100%';
    setTimeout(()=>{lb.style.display='none';renderPhotoResult(colors);},350);
  };
  img.src=url;
}

function renderPhotoResult(colors){
  const stripHTML=colors.map(c=>{
    const br=lum(c.hex)>140?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.6)';
    return`<div class="slice" style="background:${c.hex}"><span class="slice-lbl" style="color:${br}">${c.pct}%</span></div>`;
  }).join('');

  const cardsHTML=colors.map((c,i)=>`<div class="card">
    <div class="dot" style="background:${c.hex}"></div>
    <div class="c-info"><div class="c-name">${colorName(c.hex)}</div><div class="c-hex">${c.hex.toUpperCase()}</div></div>
    <span class="c-pct">${c.pct}%</span>
    <button class="copy-btn" id="ecp${i}" onclick="copyOne('ecp${i}','${c.hex.toUpperCase()}')">Copy</button>
  </div>`).join('');

  document.getElementById('photoResult').innerHTML=`
    <div class="sec-label">Color strip</div>
    <div class="strip">${stripHTML}</div>
    <div class="sec-label">Extracted colors</div>
    <div class="cards">${cardsHTML}</div>
    <button class="tg-btn" onclick="copyAllPhoto(${JSON.stringify(colors.map(c=>c.hex))},this)">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy all HEX
    </button>
    <button class="change-btn" onclick="changePhoto()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Change photo
    </button>`;
}

function changePhoto(){
  const zone=document.getElementById('uploadZone');
  zone.classList.remove('has-img');
  zone.innerHTML=`<input type="file" accept="image/*" id="fileInput" onchange="handleFile(event)" />
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    <div class="upload-main">Drop photo here<br>or tap to upload</div>
    <div class="upload-hint">JPG · PNG · WEBP</div>`;
  document.getElementById('photoResult').innerHTML=`<div class="idle-state">
    <svg viewBox="0 0 24 24"><path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
    <div class="idle-txt">Upload any photo to extract<br>its dominant color palette</div>
  </div>`;
}

function copyAllPhoto(hexes,btn){
  navigator.clipboard.writeText(hexes.join(', ')).catch(()=>{});
  btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
  setTimeout(()=>{btn.innerHTML='<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy all HEX';},1600);
}

/* ─── SHARED UTILS ─── */
function copyOne(id,hex){
  navigator.clipboard.writeText(hex).catch(()=>{});
  const b=document.getElementById(id);
  b.textContent='✓';b.classList.add('ok');
  setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok');},1400);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  const shuffleBtn=document.getElementById('shuffleBtn');
  shuffleBtn.style.display=name==='palette'?'flex':'none';
}

document.getElementById('hexInput').addEventListener('keydown',e=>{if(e.key==='Enter')applyHex();});

/* ─── TELEGRAM SDK ─── */
if(window.Telegram&&Telegram.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

buildSwatches();
renderPalette();
</script>
